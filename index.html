<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Database - JSONBin</title>
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
    <div class="container">
        <h1>👥 Employee Database</h1>
        <p class="subtitle">Powered by JSONBin.io - Instant Updates!</p>

        <!-- JSONBin Config Section -->
        <div class="config-section">
            <h3>⚙️ JSONBin Configuration</h3>
            <input type="text" id="binId" placeholder="Bin ID (jaise: 64a1b2c3d4e5f6g7)">
            <input type="password" id="masterKey" placeholder="X-Master-Key ($2b$10$ se shuru)">
            <button id="saveConfigBtn" class="secondary-btn">💾 Save Config</button>
            <p class="info">Bin ID aur Master Key ek baar daalo, browser mein save ho jayegi!</p>
        </div>

        <!-- Add Employee Form -->
        <div class="form-section">
            <h2>➕ Add New Employee</h2>
            <form id="employeeForm">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="text" id="department" placeholder="Department" required>
                <input type="number" id="salary" placeholder="Salary (₹)" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="tel" id="phone" placeholder="Phone Number" required>
                <input type="date" id="joiningDate" required>
                <button type="submit">Add Employee</button>
            </form>
        </div>

        <!-- Employee List -->
        <div class="list-section">
            <h2>📋 Employee List</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by name or department...">
            </div>
            <div id="employeeList">
                <div class="loading">⏳ Loading employees...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
